# Cobranzas - HTTPS -> proxy a la app Node en 127.0.0.1:3100.
# Cambia el dominio y la ruta del certificado por los tuyos.
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName cobranzas.tudominio.com

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    ErrorLog ${APACHE_LOG_DIR}/cobranzas_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/cobranzas_ssl_access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/tudominio/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tudominio/privkey.pem
</VirtualHost>
</IfModule>

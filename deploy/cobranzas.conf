# Cobranzas - HTTP -> redirige a HTTPS.  Cambia el dominio por el tuyo.
<VirtualHost *:80>
    ServerName cobranzas.tudominio.com

    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/cobranzas_error.log
    CustomLog ${APACHE_LOG_DIR}/cobranzas_access.log combined
</VirtualHost>
